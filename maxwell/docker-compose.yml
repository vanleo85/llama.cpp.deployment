version: '3.8'

services:
  bge-m3:
    image: llama-server-cuda:11.8.0-22.04
    container_name: bge-m3
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    ports:
      - "8080:8080"
    volumes:
      - ${MODELS_VOLUME}
    environment:
      - LLAMA_ARG_MODEL=${BGE_M3_MODEL_PATH}
      - LLAMA_ARG_N_GPU_LAYERS=99
      - LLAMA_ARG_CTX_SIZE=4096
      - LLAMA_ARG_HOST=0.0.0.0
      - LLAMA_ARG_PORT=8080
      - LLAMA_API_KEY=${API_KEY:-your_secret_key}
    command:
      - --embedding

  bge-reranker-v2-m3:
    image: llama-server-cuda:11.8.0-22.04
    container_name: bge-reranker-v2-m3
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    ports:
      - "8081:8080"
    volumes:
      - ${MODELS_VOLUME}
    environment:
      - LLAMA_ARG_MODEL=${BGE_RERANKER_MODEL_PATH}
      - LLAMA_ARG_ALIAS=${BGE_RERANKER_MODEL_ALIAS}
      - LLAMA_ARG_N_GPU_LAYERS=${BGE_RERANKER_N_GPU_LAYERS}
      - LLAMA_ARG_CTX_SIZE=${BGE_RERANKER_CTX_SIZE}
      - LLAMA_ARG_HOST=0.0.0.0
      - LLAMA_ARG_PORT=8080
      - LLAMA_ARG_TIMEOUT=3600
      - LLAMA_ARG_THREADS_HTTP=4
      - LLAMA_API_KEY=${API_KEY:-your_secret_key}
      - LLAMA_ARG_UBATCH=${BGE_RERANKER_UBATCH_SIZE}
      - LLAMA_ARG_BATCH=${BGE_RERANKER_BATCH_SIZE}
      - LLAMA_ARG_N_PARALLEL=${BGE_RERANKER_N_PARALLEL}
    command:
      - --rerank
      - --pooling
      - rank

  llama-31-8b-q6k:
    image: llama-server-cuda:11.8.0-22.04
    container_name: llama-31-8b-q6k
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    ports:
      - "8090:8080"
    volumes:
      - ${MODELS_VOLUME}
    environment:
      - LLAMA_ARG_MODEL=${LLAMA_31_8B_MODEL_PATH}
      - LLAMA_ARG_N_GPU_LAYERS=99
      - LLAMA_ARG_CTX_SIZE=${CTX_SIZE_8K}
      - LLAMA_ARG_HOST=0.0.0.0
      - LLAMA_ARG_PORT=8080
      - LLAMA_API_KEY=${API_KEY:-your_secret_key}
